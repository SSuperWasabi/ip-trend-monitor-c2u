name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys when several pushes land quickly.
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory
        # Publish only the static site, excluding repo metadata so files like
        # .git/ are never uploaded to the public CDN.
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='*.ps1' \
            --exclude='*.md' \
            --exclude='*.txt' \
            --exclude='*.url' \
            --exclude='*.dat' \
            --exclude='*.log' \
            --exclude='*.pid' \
            --exclude='email-draft.html' \
            --exclude='.gitignore' \
            ./ _site/

      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx -y netlify-cli@latest deploy \
            --prod \
            --dir=_site \
            --message="GitHub Actions: ${GITHUB_SHA::7}"
